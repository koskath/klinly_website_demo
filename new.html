<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klinly — Ειδικός Προετοιμασίας Φιλοξενίας</title>
    <meta name="description" content="Application coming soon" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-weight='bold' font-family='system-ui,sans-serif'%3EK%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --foreground: hsl(200, 24%, 12%);
        --muted-foreground: hsl(200, 10%, 45%);
        --sky-100: #e0f2fe;
        --sky-600: #0284c7;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        background: #fff;
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
      }

      h1 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      .container {
        width: 100%;
        max-width: 64rem;
        margin-left: auto;
        margin-right: auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .page-header {
        background: #fff;
        color: var(--foreground);
      }

      .page-header .inner {
        padding: 1.5rem 1rem;
      }

      .demo-strip {
        text-align: center;
        margin-bottom: 0.75rem;
      }

      .demo-badge {
        display: inline-block;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.25;
        text-align: center;
        color: hsl(0, 72%, 38%);
        background: hsl(0, 100%, 97%);
        border: 2px solid hsl(0, 65%, 65%);
        box-shadow: 0 2px 6px hsl(0 60% 30% / 0.12);
      }

      @media (min-width: 768px) {
        .demo-badge {
          font-size: 1.0625rem;
          padding: 0.55rem 1.15rem;
        }
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--muted-foreground);
        text-decoration: none;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--foreground);
      }

      .back-link svg {
        width: 1rem;
        height: 1rem;
        flex-shrink: 0;
      }

      .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 3rem 1rem;
      }

      .panel {
        width: 100%;
        max-width: 28rem;
        text-align: center;
      }

      .icon-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 2rem;
      }

      .icon-circle {
        border-radius: 999px;
        background: var(--sky-100);
        padding: 1.5rem;
        display: inline-flex;
      }

      .icon-circle svg {
        width: 4rem;
        height: 4rem;
        color: var(--sky-600);
      }

      .panel h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.5rem, 4vw, 1.875rem);
        font-weight: 700;
        color: var(--foreground);
      }

      .coming-soon {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--muted-foreground);
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div class="container inner">
        <div class="demo-strip">
          <span
            class="demo-badge"
            role="status"
            title="Static demo — not the final website."
            >Demo</span>
        </div>
        <a class="back-link" href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
          <span>Πίσω</span>
        </a>
      </div>
    </header>

    <main class="main-content">
      <div class="container panel">
        <div class="icon-wrap">
          <div class="icon-circle" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="20" x="5" y="2" rx="2" ry="2" />
              <path d="M12 18h.01" />
            </svg>
          </div>
        </div>

        <h1>Κατεβάστε την εφαρμογή</h1>
        <p class="coming-soon">Application coming soon</p>
      </div>
    </main>
  </body>
</html>
